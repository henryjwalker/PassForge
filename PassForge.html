<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassForge - Memorable Password Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35), 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
            margin: 0;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .password-display {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 28px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 24px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
        }

        .password-display.copied {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-color: #34d399;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .generate-btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4);
        }

        .copy-btn {
            background: #4299e1;
            color: white;
        }

        .copy-btn:hover {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(66, 153, 225, 0.4);
        }

        .copy-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .notification {
            text-align: center;
            color: #48bb78;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .settings-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            padding: 10px;
            color: #4a5568;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-toggle:hover {
            background: #e2e8f0;
            border-color: #cbd5e0;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 999;
        }

        .settings-overlay.visible {
            display: block;
        }

        .settings-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
            padding: 32px 24px;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 1000;
        }

        .settings-panel.visible {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }

        .settings-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a202c;
            width: 100%;
        }

        .settings-close {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #718096;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
        }

        .settings-close:hover {
            color: #2d3748;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-item label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .setting-item input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .setting-item input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .setting-item textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
        }

        .strength-meter {
            margin-top: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            color: #718096;
        }

        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .word-count-info {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        .reset-words-btn {
            padding: 8px 16px;
            background: #718096;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }

        .reset-words-btn:hover {
            background: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="settings-toggle" onclick="toggleSettings()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </button>

        <div class="header">
            <img src="logo.png" alt="PassForge Logo" class="logo">
            <h1>PassForge</h1>
        </div>
        <p class="subtitle">Forge memorable, secure passwords in seconds</p>

        <div class="password-display" id="passwordDisplay">
            Click "Generate" to create a password
        </div>

        <div class="strength-meter" id="strengthMeter" style="display: none;">
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span id="strengthText"></span>
        </div>

        <div class="buttons">
            <button class="generate-btn" onclick="generatePassword()">Generate</button>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()" disabled>Copy</button>
        </div>

        <div class="notification" id="notification"></div>

        <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <div class="settings-title">Settings</div>
                <button class="settings-close" onclick="toggleSettings()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="setting-item">
                <label>Number of words</label>
                <input type="number" id="wordCount" min="2" max="8" value="3" onchange="saveSettings()">
            </div>
            <div class="setting-item">
                <label>Numbers to add</label>
                <input type="number" id="numberCount" min="0" max="8" value="4" onchange="saveSettings()">
            </div>
            <div class="setting-item">
                <label>Symbols to add</label>
                <input type="number" id="symbolCount" min="0" max="5" value="1" onchange="saveSettings()">
            </div>
            <div class="setting-item">
                <label class="checkbox-label">
                    <input type="checkbox" id="capitalize" checked onchange="saveSettings()">
                    Capitalize first letter of each word
                </label>
            </div>
            <div class="setting-item">
                <label class="checkbox-label">
                    <input type="checkbox" id="separator" checked onchange="saveSettings()">
                    Use separator between words
                </label>
            </div>
            <div class="setting-item">
                <label>Custom word list (one word per line)</label>
                <textarea id="customWords" placeholder="Leave empty to use default words..." oninput="updateCustomWords()"></textarea>
                <div class="word-count-info" id="wordCountInfo">Using 200 default words</div>
                <button class="reset-words-btn" onclick="resetWords()">Reset to defaults</button>
            </div>
        </div>
    </div>

        ];

        let words = [...defaultWords];
        let currentPassword = '';

        // Settings object
        const defaultSettings = {
            wordCount: 3,
            numberCount: 2,
            symbolCount: 0,
            capitalize: true,
            separator: true,
            customWords: ''
        };

        document.getElementById('wordCount').value = defaultSettings.wordCount;
        document.getElementById('numberCount').value = defaultSettings.numberCount;
        document.getElementById('symbolCount').value = defaultSettings.symbolCount;
        document.getElementById('capitalize').checked = defaultSettings.capitalize;
        document.getElementById('separator').checked = defaultSettings.separator;

        // Load settings from URL hash
        function loadSettings() {
            try {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    const settings = JSON.parse(decodeURIComponent(hash));
                    document.getElementById('wordCount').value = settings.wordCount || defaultSettings.wordCount;
                    document.getElementById('numberCount').value = settings.numberCount || defaultSettings.numberCount;
                    document.getElementById('symbolCount').value = settings.symbolCount || defaultSettings.symbolCount;
                    document.getElementById('capitalize').checked = settings.capitalize !== undefined ? settings.capitalize : defaultSettings.capitalize;
                    document.getElementById('separator').checked = settings.separator !== undefined ? settings.separator : defaultSettings.separator;
                    
                    if (settings.customWords) {
                        document.getElementById('customWords').value = settings.customWords;
                        updateCustomWords();
                    }
                }
            } catch (e) {
                console.log('No saved settings found');
            }
        }

        // Save settings to URL hash
        function saveSettings() {
            const settings = {
                wordCount: parseInt(document.getElementById('wordCount').value),
                numberCount: parseInt(document.getElementById('numberCount').value),
                symbolCount: parseInt(document.getElementById('symbolCount').value),
                capitalize: document.getElementById('capitalize').checked,
                separator: document.getElementById('separator').checked,
                customWords: document.getElementById('customWords').value
            };
            window.location.hash = encodeURIComponent(JSON.stringify(settings));
        }

        function updateCustomWords() {
            const customText = document.getElementById('customWords').value.trim();
            if (customText) {
                words = customText.split('\n').map(w => w.trim()).filter(w => w.length > 0);
                document.getElementById('wordCountInfo').textContent = 'Using ' + words.length + ' custom words';
            } else {
                words = [...defaultWords];
                document.getElementById('wordCountInfo').textContent = 'Using ' + defaultWords.length + ' default words';
            }
            saveSettings();
        }

        function resetWords() {
            document.getElementById('customWords').value = '';
            updateCustomWords();
        }

        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generatePassword() {
            const wordCount = parseInt(document.getElementById('wordCount').value);
            const numberCount = parseInt(document.getElementById('numberCount').value);
            const symbolCount = parseInt(document.getElementById('symbolCount').value);
            const capitalize = document.getElementById('capitalize').checked;
            const useSeparator = document.getElementById('separator').checked;

            const symbols = ['!', '@', '#', '$', '%', '&', '*', '?'];
            const separators = ['-', '_'];

            // Create word parts
            let wordParts = [];
            for (let i = 0; i < wordCount; i++) {
                let word = getRandomElement(words);
                if (capitalize) {
                    word = word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
                wordParts.push({ type: 'word', value: word });
            }

            // Create number parts and group them
            let numberParts = [];
            for (let i = 0; i < numberCount; i++) {
                numberParts.push(Math.floor(Math.random() * 10).toString());
            }

            // Group numbers into 1-2 chunks
            const numChunks = Math.min(2, Math.max(1, Math.floor(numberCount / 2)));
            let numberGroups = [];
            let numbersLeft = [...numberParts];
            
            for (let i = 0; i < numChunks && numbersLeft.length > 0; i++) {
                const chunkSize = Math.ceil(numbersLeft.length / (numChunks - i));
                const chunk = numbersLeft.splice(0, chunkSize);
                numberGroups.push(chunk.join(''));
            }

            // Insert number groups at random positions
            let allParts = [...wordParts];
            numberGroups.forEach(numGroup => {
                const position = Math.floor(Math.random() * (allParts.length + 1));
                allParts.splice(position, 0, { type: 'number', value: numGroup });
            });

            // Join parts with separator
            const separator = useSeparator ? getRandomElement(separators) : '';
            currentPassword = allParts.map(p => p.value).join(separator);

            // Add symbols at the end with separator
            if (symbolCount > 0) {
                if (useSeparator) {
                    currentPassword += separator;
                }
                for (let i = 0; i < symbolCount; i++) {
                    currentPassword += getRandomElement(symbols);
                }
            }

            // Display password
            const display = document.getElementById('passwordDisplay');
            display.textContent = currentPassword;
            display.classList.remove('copied');
            document.getElementById('copyBtn').disabled = false;
            document.getElementById('notification').textContent = '';

            // Update strength meter
            updateStrengthMeter(currentPassword);
        }

        function updateStrengthMeter(password) {
            const meter = document.getElementById('strengthMeter');
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            const length = password.length;
            let strength = 0;
            let color = '';
            let label = '';

            if (length < 12) {
                strength = 33;
                color = '#f56565';
                label = 'Weak';
            } else if (length < 16) {
                strength = 66;
                color = '#ed8936';
                label = 'Good';
            } else {
                strength = 100;
                color = '#48bb78';
                label = 'Strong';
            }

            fill.style.width = strength + '%';
            fill.style.background = color;
            text.textContent = label + ' (' + length + ' characters)';
            meter.style.display = 'block';
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(currentPassword);
                const display = document.getElementById('passwordDisplay');
                display.classList.add('copied');
                document.getElementById('notification').textContent = '✓ Copied! Paste with ⌘+V';
                
                setTimeout(() => {
                    display.classList.remove('copied');
                    document.getElementById('notification').textContent = '';
                }, 3000);
            } catch (err) {
                document.getElementById('notification').textContent = 'Failed to copy';
            }
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            const overlay = document.getElementById('settingsOverlay');
            panel.classList.toggle('visible');
            overlay.classList.toggle('visible');
        }

        // Initialize
        loadSettings();
        
        // Auto-generate password on load with a slight delay for animation
        setTimeout(() => {
            generatePassword();
        }, 800);
